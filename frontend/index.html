<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivinhe o Número</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Adivinhe o Número Secreto (1-100)</h1>
        <form id="form-jogo">
            <div class="jogo-area">
                <label for="input-palpite">Seu palpite:</label>
                <input type="number" id="input-palpite" name="palpite" min="1" max="100" aria-describedby="mensagem-feedback">
                <button type="submit" id="btn-adivinhar">Adivinhar</button>
                <p id="mensagem-feedback" aria-live="polite">Boa sorte!</p>
            </div>
        </form>

        <div id="area-acertou" class="hidden">
            <h2>Você Acertou!</h2>
            <p>Você usou <span id="total-tentativas">0</span> tentativas.</p>
            <label for="input-nome">Nome para o ranking:</label>
            <input type="text" id="input-nome" placeholder="Digite seu nome para o ranking">
            <button id="btn-salvar-score">Salvar no Ranking</button>
        </div>
    </div>

    <div class="ranking-container">
        <h2>🏆 Ranking (Melhores 5)</h2>
        <button id="btn-atualizar-ranking">Atualizar Ranking</button>
        <ol id="lista-ranking"></ol>
    </div>

    <script src="script.js"></script>
</body>
</html>
